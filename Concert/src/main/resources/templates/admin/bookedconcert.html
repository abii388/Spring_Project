<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
		<link rel="stylesheet" th:href="@{/css/nav.css}"/>
		<link rel="stylesheet" th:href="@{/css/concertList.css}"/>
    </head>
    <body>
		<div th:replace="~{admin/adminnav.html}"></div>
		<table>
		    <thead>
		        <tr>
		            <th>Name</th>
		            <th>Date</th>
		            <th>Price</th>
		            <th>Venue</th>
					<th>Total Price</th>
					<th>Number of person</th>
					<th>UserId</th>
		            <th>username</th>
		            <th>Actions</th>
		        </tr>
		    </thead>
		    <tbody>
		        <tr th:each="concert : ${concert}">
		            <td th:text="${concert.concertName}"></td>
		            <td th:text="${concert.concertDate}"></td>
		            <td th:text="${concert.ticketPrice}"></td>
		            <td th:text="${concert.venue}"></td>
					<td th:text="${concert.totalPrice}"></td>
					<td th:text="${concert.numberofPerson}"></td>
					<td th:text="${concert.userId}"></td>
		            <td th:text="${concert.userName}"></td>
		            <td>
		                
		                <a th:href="@{'/delete/' + ${concert.id}}" class="btn delete" 
		                   onclick="return confirm('Are you sure you want to delete this concert?');">Delete</a>
		            </td>
		        </tr>
		    </tbody>
		</table>

		
    </body>
</html>
