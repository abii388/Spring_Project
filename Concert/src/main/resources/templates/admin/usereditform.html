

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Concert</title>
    <link rel="stylesheet" th:href="@{/css/concertform.css}" />
</head>
<body>
    <div th:replace="~{admin/adminnav.html}"></div>

    <div class="form-container">
        <h2 th:text="*{user.userName}"></h2>

		
 
   <form  th:action="@{/userupdate/}+${id}" method="post" th:object="${user}">
	<div class="form-group">
					<label for="userId">ID:</label>
					<input type="text" th:value="*{id}" name="id" required /><br/><br/>

	            </div>
           <div class="form-group">
				<label for="userName">User Name:</label>
				<input type="text" name="userName" th:field="*{userName}"  required  /><br/><br/>
            </div>

		   <div class="form-group">
				<label for="userDate">Email:</label>
				<input type="text" th:field="*{email}" name="email" required  /><br/><br/>

            </div>
			<div class="form-group">
						<label for="userDate">Phonenumber:</label>
						<input type="text" th:field="*{phoneNumber}" name="phoneNumber" required /><br/><br/>
             </div>

			 <button type="submit">Submit</button>
            
           
        </form>
    </div>
</body>
</html>
