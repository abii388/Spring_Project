<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Concert List</title>
    <link rel="stylesheet" th:href="@{/css/nav.css}" />
    <link rel="stylesheet" th:href="@{/css/concertList.css}" />
    <style>
		.pagination{
		        display: flex;
			    align-items: center;
			    justify-content: center;
		}
        .pagination a {
            margin: 0 10px;
            padding: 10px ;
            background-color: #ddd;
            text-decoration: none;
            border-radius: 5px;
			
        }
        .pagination .active {
            background-color: #4CAF50;
            color: white;
        }
        .search-form select,
        .search-form input[type="text"] {
            padding: 6px;
            margin-right: 8px;
            width: 200px;
        }
		.container{
			margin:0px 50px;
			    display: flex;
			    flex-direction: column;
			}
		
    </style>
</head>
<body>
    <div th:replace="~{admin/adminnav.html}"></div>

    <form th:action="@{/viewconcert}" method="get" class="search-form">
        <input type="text" name="keyword" placeholder="Search by name or venue" th:value="${param.keyword}" />
        
        <select name="status">
            <option value="" th:selected="${param.status == null or param.status == ''}">All Status</option>
            <option value="Enable" th:selected="${param.status == 'Enable'}">Enable</option>
         <option value="Disable" th:selected="${param.status == 'Disable'}">Disable</option>
       
 </select>
        
        <button type="submit">Search</button>
    </form>
<div class="container">
    <table>
        <thead>
            <tr>
                <th>
                        Name
                  
                </th>
                <th>
                        Date
                    
                </th>
                <th>
                        Price
                 
                </th>
                <th>Venue</th>
                <th>Available Tickets</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="concert : ${concertPage.content}">
                <td th:text="${concert.concertName}"></td>
                <td th:text="${concert.concertDate}"></td>
                <td th:text="${concert.ticketPrice}"></td>
                <td th:text="${concert.venue}"></td>
                <td th:text="${concert.availableTickets}"></td>
                <td>
                    <a th:href="@{'/edit/' + ${concert.id}}" class="btn edit">Edit</a>
                    <a th:href="@{'/display/' + ${concert.id}}" class="btn view">View</a>
                    <a th:href="@{'/viewusers/' + ${concert.concertName}}" class="btn view_users">View users</a>
                    <a th:href="@{'/delete/' + ${concert.id}}"
                       onclick="return confirm('Are you sure?')" class="btn delete">Delete</a>
					   <a th:href="@{'/status/' + ${concert.id}}"
					   					   th:text="${concert.status == 'Enable' ? 'Enable' : 'Disable'}"
					   					   th:classappend="${concert.status == 'Enable' ? 'btn-enable' : 'btn-disable'}"
					   					   class="btn status-toggle">
					   	</a>
                </td>
            </tr>
        </tbody>
    </table>

    <!-- Pagination -->
    <div class="pagination">
        <a th:if="${currentPage > 0}" 
           th:href="@{/viewconcert(page=${currentPage - 1}, sortBy=${sortBy}, sortDir=${sortDir}, keyword=${param.keyword}, status=${param.status})}">
            Previous
        </a>

        <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <a th:href="@{/viewconcert(page=${i}, sortBy=${sortBy}, sortDir=${sortDir}, keyword=${param.keyword}, status=${param.status})}"
               th:text="${i + 1}"
               th:class="${i == currentPage} ? 'active' : ''">
            </a>
        </span>

        <a th:if="${currentPage < totalPages - 1}"
           th:href="@{/viewconcert(page=${currentPage + 1}, sortBy=${sortBy}, sortDir=${sortDir}, keyword=${param.keyword}, status=${param.status})}">
            Next
        </a>
    </div>
</div>
</body>
</html>
